version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: localskillhub_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: localskillhub
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - localskillhub_network

  redis:
    image: redis:alpine
    container_name: localskillhub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - localskillhub_network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

networks:
  localskillhub_network:
    driver: bridge
